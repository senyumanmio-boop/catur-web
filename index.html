<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Catur AI Pelatih</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #222;
    font-family: Arial, sans-serif;
    color: #fff;
  }
  h1 {
    margin-top: 20px;
  }
  #chessboard {
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
    gap: 2px;
    margin-top: 20px;
  }
  .square {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    cursor: pointer;
    user-select: none;
  }
  .white {
    background-color: #eee;
  }
  .black {
    background-color: #555;
  }
  #controls {
    margin-top: 20px;
    display: flex;
    gap: 15px;
  }
  button {
    padding: 10px 20px;
    border: none;
    background-color: #ffd700;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  button:hover {
    background-color: #e6c200;
  }
</style>
</head>
<body>
<h1>Game Catur AI Pelatih</h1>
<div id="chessboard"></div>
<div id="controls">
  <button id="startBtn">Mulai Baru</button>
  <button id="aiMoveBtn">AI Langsung Main</button>
</div>

<script>
// Representasi papan dan piece
const initialBoard = [
  ['r','n','b','q','k','b','n','r'],
  ['p','p','p','p','p','p','p','p'],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['','','','','','','',''],
  ['P','P','P','P','P','P','P','P'],
  ['R','N','B','Q','K','B','N','R']
];

const pieceUnicode = {
  'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟',
  'R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'
};

let board = [];
let selectedPiece = null;
let turn = 'white'; // 'white' atau 'black'
let gameActive = true;

// Render papan
const boardDiv = document.getElementById('chessboard');

function renderBoard() {
  boardDiv.innerHTML = '';
  for(let i=0; i<8; i++) {
    for(let j=0; j<8; j++) {
      const square = document.createElement('div');
      square.className = 'square ' + ((i+j)%2==0?'white':'black');
      square.dataset.row = i;
      square.dataset.col = j;
      const piece = board[i][j];
      if(piece) {
        square.textContent = pieceUnicode[piece];
        if((piece === piece.toUpperCase() && turn === 'white') || (piece === piece.toLowerCase() && turn === 'black')) {
          square.style.fontWeight = 'bold';
        }
      } else {
        square.textContent = '';
      }
      square.addEventListener('click', handleSquareClick);
      boardDiv.appendChild(square);
    }
  }
}

// Reset papan
function resetBoard() {
  board = initialBoard.map(row => row.slice());
  turn = 'white';
  gameActive = true;
  renderBoard();
}

// Cek valid move sederhana (hanya pion dan raja, bisa dikembangkan)
function getValidMoves(row, col) {
  const piece = board[row][col];
  const moves = [];
  if(!piece) return moves;

  // Contoh rules sederhana: pion dan raja
  if(piece.toLowerCase() === 'p') {
    if(piece === 'P') {
      if(row > 0 && board[row-1][col] === '') {
        moves.push({row: row-1, col: col});
      }
    } else {
      if(row <7 && board[row+1][col] === '') {
        moves.push({row: row+1, col: col});
      }
    }
  } else if(piece.toLowerCase() === 'k') {
    const directions = [
      {r: -1, c: -1},{r: -1, c: 0},{r: -1, c: 1},
      {r: 0, c: -1},{r: 0, c: 1},
      {r: 1, c: -1},{r: 1, c: 0},{r: 1, c: 1}
    ];
    directions.forEach(d => {
      const nr = row + d.r;
      const nc = col + d.c;
      if(nr >=0 && nr<8 && nc>=0 && nc<8) {
        if(!board[nr][nc] || (board[nr][nc].toLowerCase() !== piece.toLowerCase())) {
          moves.push({row: nr, col: nc});
        }
      }
    });
  }
  // Tambahkan aturan lain sesuai kebutuhan
  return moves;
}

// Klik papan
function handleSquareClick(e) {
  if(!gameActive) return;
  const row = parseInt(e.target.dataset.row);
  const col = parseInt(e.target.dataset.col);
  const piece = board[row][col];

  if(selectedPiece) {
    // Pindahkan
    const validMoves = getValidMoves(selectedPiece.row, selectedPiece.col);
    const isValid = validMoves.some(m => m.row===row && m.col===col);
    if(isValid) {
      board[row][col] = board[selectedPiece.row][selectedPiece.col];
      board[selectedPiece.row][selectedPiece.col] = '';
      switchTurn();
    }
    selectedPiece = null;
    renderBoard();
  } else {
    // Pilih pion
    if(piece && ((turn==='white' && piece===piece.toUpperCase()) || (turn==='black' && piece===piece.toLowerCase()))) {
      selectedPiece = {row, col};
    }
  }
}

// Ganti giliran
function switchTurn() {
  turn = turn === 'white' ? 'black' : 'white';
  // Jika AI giliran, panggil AI move
  if(turn==='black') {
    setTimeout(aiMove, 500);
  }
}

// AI move sederhana (menggunakan minimax)
function aiMove() {
  if(!gameActive) return;
  // Cari semua langkah AI
  const moves = [];
  for(let i=0; i<8; i++) {
    for(let j=0; j<8; j++) {
      if(board[i][j] && board[i][j]===board[i][j].toLowerCase()) { // pion hitam dan lain-lain
        const validMoves = getValidMoves(i,j);
        validMoves.forEach(m => {
          moves.push({from: {row: i, col: j}, to: m});
        });
      }
    }
  }
  if(moves.length===0) {
    alert('Permainan selesai!');
    gameActive = false;
    return;
  }
  // Pilih langkah secara acak (bisa dikembangkan Minimax)
  const move = moves[Math.floor(Math.random() * moves.length)];
  board[move.to.row][move.to.col] = board[move.from.row][move.from.col];
  board[move.from.row][move.from.col] = '';
  switchTurn();
  renderBoard();
}

// Event listener tombol
document.getElementById('startBtn').addEventListener('click', resetBoard);
document.getElementById('aiMoveBtn').addEventListener('click', aiMove);

// Inisialisasi
resetBoard();

</script>
</body>
</html>
